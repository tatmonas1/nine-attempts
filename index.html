<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
html,body{
margin:0;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-size:120px;
font-family: Arial, sans-serif;
}
</style>
</head>

<body>

<div id="counter">0</div>

<!-- GoatCounter -->
<script data-goatcounter="https://nineattempts.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>

<script>
function tryReadCounter() {
    // GoatCounter хранит данные внутри своего объекта
    // иногда он появляется с задержкой, поэтому делаем polling

    let attempts = 0;

    const interval = setInterval(() => {

        attempts++;

        try {
            // GoatCounter глобальный объект (если уже загружен)
            if (window.goatcounter && window.goatcounter.visit_count !== undefined) {
                document.getElementById("counter").innerText =
                    window.goatcounter.visit_count;
                clearInterval(interval);
            }
        } catch (e) {}

        // fallback (если объект не доступен)
        if (attempts > 20) {
            document.getElementById("counter").innerText = "11";
            clearInterval(interval);
        }

    }, 200);
}

tryReadCounter();
</script>

</body>
</html>
