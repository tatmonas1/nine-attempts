<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
html,body{
margin:0;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-size:120px;
font-family: Arial, sans-serif;
}
</style>
</head>

<body>

<div id="counter">0</div>

<script>
const repo = "nine-attempts";
const user = "tatmonas1";

// получить текущее значение
async function getCount() {
    const res = await fetch(`https://raw.githubusercontent.com/${user}/${repo}/main/count.json`);
    const data = await res.json();
    return data.count || 0;
}

// обновить счётчик
async function updateCount() {
    let count = await getCount();

    document.getElementById("counter").innerText = count;

    // увеличиваем счётчик
    count++;

    // сохраняем обратно через GitHub (через API невозможно без токена,
    // поэтому делаем хитрость: через GitHub commit вручную не надо)

    // ВАЖНО: обновление делается через отдельный "ping" файл ниже
    fetch(`https://api.countapi.xyz/hit/tatmonas1/nine-attempts`);
}

async function loadLive() {
    try {
        const res = await fetch("https://api.countapi.xyz/get/tatmonas1/nine-attempts");
        const data = await res.json();
        document.getElementById("counter").innerText = data.value;
    } catch (e) {
        document.getElementById("counter").innerText = "0";
    }
}

loadLive();
setInterval(loadLive, 2000);
</script>

</body>
</html>
