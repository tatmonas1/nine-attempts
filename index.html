<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
html,body{
margin:0;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-size:120px;
font-family: Arial, sans-serif;
}
</style>
</head>

<body>

<div id="counter">0</div>

<script>
let count = localStorage.getItem("safe_counter");

if (!count) count = 0;
count = Number(count) + 1;

localStorage.setItem("safe_counter", count);

document.getElementById("counter").innerText = count;
</script>

</body>
</html>
