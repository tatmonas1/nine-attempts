<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
html,body{
margin:0;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-size:120px;
font-family: Arial, sans-serif;
}
</style>
</head>

<body>

<div id="counter">0</div>

<script>
const namespace = "tatmonas1";
const key = "nine-attempts";

// увеличиваем счётчик при каждом заходе
async function hitCounter() {
    try {
        const res = await fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`);
        const data = await res.json();
        document.getElementById("counter").innerText = data.value;
    } catch (e) {
        document.getElementById("counter").innerText = "0";
    }
}

// первый запуск
hitCounter();
</script>

</body>
</html>
