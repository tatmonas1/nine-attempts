<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
html,body{
margin:0;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-size:140px;
font-family: Arial, sans-serif;
}
</style>
</head>

<body>

<div id="counter">0</div>

<script>
// локально-устойчивый счётчик (работает всегда)
let count = localStorage.getItem("nine_attempts_count");

if (!count) {
    count = 0;
} else {
    count = parseInt(count);
}

// увеличиваем при каждом заходе
count = count + 1;

localStorage.setItem("nine_attempts_count", count);

// показываем
document.getElementById("counter").innerText = count;
</script>

</body>
</html>
