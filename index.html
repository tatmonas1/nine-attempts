<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
html,body{
margin:0;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-size:120px;
font-family: Arial, sans-serif;
}
</style>
</head>

<body>

<div id="counter">0</div>

<!-- GoatCounter -->
<script data-goatcounter="https://nineattempts.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>

<script>
async function update() {
    try {
        // правильный публичный endpoint GoatCounter
        const res = await fetch("https://nineattempts.goatcounter.com/counter.json");
        const data = await res.json();

        document.getElementById("counter").innerText =
            data.count || 0;
    } catch (e) {
        document.getElementById("counter").innerText = "0";
    }
}

update();
setInterval(update, 3000);
</script>

</body>
</html>
