<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-family: Arial, sans-serif;
font-size: 60px;
}
</style>

</head>

<body>

<div id="counter">0</div>

<script>
async function loadCounter() {
    try {
        const res = await fetch("https://nineattempts.goatcounter.com/counter/totals.json?path=/nine-attempts/");
        const data = await res.json();

        document.getElementById("counter").innerText =
            data.count || 0;
    } catch (e) {
        document.getElementById("counter").innerText = "0";
    }
}

loadCounter();
setInterval(loadCounter, 5000);
</script>

</body>
</html>
